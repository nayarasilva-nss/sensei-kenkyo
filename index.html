<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sensei — Kenkyo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.app{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);width:100%;max-width:480px;overflow:hidden;display:flex;flex-direction:column}
#login,#pin{display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;min-height:560px}
#login.active,#pin.active{display:flex}
#chat{display:none;flex-direction:column;height:560px}
#chat.active{display:flex}
.logo{width:48px;height:48px;background:#8B0000;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;flex-shrink:0}
.logo svg{width:26px;height:26px}
h1{font-size:22px;font-weight:500;color:#1a1a1a;letter-spacing:1px;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:2rem}
.lbl{font-size:14px;color:#555;margin-bottom:12px}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px}
.role-btn{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;cursor:pointer;text-align:left;transition:border-color .15s}
.role-btn:hover{border-color:#8B0000}
.ri{font-size:22px;margin-bottom:6px}
.rn{font-size:14px;font-weight:500;color:#1a1a1a}
.rd{font-size:12px;color:#888;margin-top:2px}
.ft{font-size:11px;color:#bbb;margin-top:1.5rem}
.pr{font-size:16px;font-weight:500;color:#1a1a1a;margin-top:12px;margin-bottom:4px}
.ph{font-size:13px;color:#888;margin-bottom:1.5rem}
.dots{display:flex;gap:12px;margin-bottom:1.5rem}
.dot{width:14px;height:14px;border-radius:50%;background:#eee;border:2px solid #ccc;transition:all .15s}
.dot.on{background:#8B0000;border-color:#8B0000}
.dot.err{background:#cc0000;border-color:#cc0000}
.perr{font-size:13px;color:#cc0000;margin-bottom:1rem;min-height:20px}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px}
.key{height:56px;border-radius:10px;font-size:20px;background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;cursor:pointer;transition:background .1s}
.key:hover{background:#f5f5f5}
.key.emp{background:transparent;border:none;cursor:default}
.back{margin-top:1.5rem;font-size:13px;color:#888;background:none;border:none;cursor:pointer}
.ch{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid #f0f0f0}
.chl{display:flex;align-items:center;gap:10px}
.clt{font-size:14px;font-weight:500;color:#1a1a1a}
.clr{font-size:11px;color:#888}
.exit{font-size:12px;color:#888;background:none;border:none;cursor:pointer}
.msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;align-items:flex-start}
.msg.u{justify-content:flex-end}
.ml{width:28px;height:28px;background:#8B0000;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;margin-top:2px}
.ml svg{width:15px;height:15px}
.bub{max-width:75%;padding:.6rem .9rem;font-size:14px;line-height:1.6;border-radius:12px}
.bub.b{background:#f5f5f5;border:1px solid #ebebeb;border-radius:12px 12px 12px 4px;color:#1a1a1a}
.bub.u2{background:#8B0000;color:#fff;border-radius:12px 12px 4px 12px}
.typing{display:flex;gap:4px;padding:.6rem .9rem;background:#f5f5f5;border:1px solid #ebebeb;border-radius:12px 12px 12px 4px}
.d{width:6px;height:6px;border-radius:50%;background:#8B0000;opacity:.4}
.ci{display:flex;gap:8px;padding:.75rem 1rem;border-top:1px solid #f0f0f0}
.ci input{flex:1;font-size:14px;padding:.5rem .75rem;border:1px solid #e0e0e0;border-radius:8px;outline:none}
.ci input:focus{border-color:#8B0000}
.sb{background:#8B0000;color:#fff;border:none;border-radius:8px;padding:.5rem 1rem;font-size:14px;font-weight:500;cursor:pointer}
.sb:disabled{background:#e0e0e0;color:#aaa;cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.shake{animation:shake .4s ease}
</style>
</head>
<body>
<div class="app">

<div id="login" class="active">
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
  <h1>Sensei</h1>
  <p class="sub">Assistente interno Kenkyo</p>
  <p class="lbl">Selecione seu cargo</p>
  <div class="roles">
    <button class="role-btn" onclick="selectRole('gerente','1206')"><div class="ri">👔</div><div class="rn">Gerente</div><div class="rd">Acesso total</div></button>
    <button class="role-btn" onclick="selectRole('lider','0612')"><div class="ri">🧑‍🍳</div><div class="rn">Lider</div><div class="rd">Operacoes e equipe</div></button>
    <button class="role-btn" onclick="selectRole('liderado','1312')"><div class="ri">👥</div><div class="rn">Colaborador</div><div class="rd">Duvidas do dia a dia</div></button>
    <button class="role-btn" onclick="selectRole('administrativo','2426')"><div class="ri">📋</div><div class="rn">Administrativo</div><div class="rd">Processos administrativos</div></button>
  </div>
  <p class="ft">Kenkyo Cozinha Oriental &bull; Uso interno</p>
</div>

<div id="pin">
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
  <p class="pr" id="pinLabel"></p>
  <p class="ph">Digite a senha de acesso</p>
  <div class="dots" id="dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <p class="perr" id="perr"></p>
  <div class="kp">
    <button class="key" onclick="pk('1')">1</button><button class="key" onclick="pk('2')">2</button><button class="key" onclick="pk('3')">3</button>
    <button class="key" onclick="pk('4')">4</button><button class="key" onclick="pk('5')">5</button><button class="key" onclick="pk('6')">6</button>
    <button class="key" onclick="pk('7')">7</button><button class="key" onclick="pk('8')">8</button><button class="key" onclick="pk('9')">9</button>
    <button class="key emp"></button><button class="key" onclick="pk('0')">0</button><button class="key" onclick="pd()">&#9003;</button>
  </div>
  <button class="back" onclick="goBack()">&#8592; Voltar</button>
</div>

<div id="chat">
  <div class="ch">
    <div class="chl">
      <div class="logo" style="width:32px;height:32px;border-radius:7px;margin:0"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div><div class="clt">Sensei</div><div class="clr" id="chatRole"></div></div>
    </div>
    <button class="exit" onclick="goBack()">Sair</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="ci">
    <input type="text" id="inp" placeholder="Faca sua pergunta..."/>
    <button class="sb" onclick="send()">Enviar</button>
  </div>
</div>

</div>
<script>
const ROLES={
  gerente:{label:'Gerente',icon:'👔',senha:'1206'},
  lider:{label:'Lider',icon:'🧑‍🍳',senha:'0612'},
  liderado:{label:'Colaborador',icon:'👥',senha:'1312'},
  administrativo:{label:'Administrativo',icon:'📋',senha:'2426'}
};
let cur=null,pin='',msgs=[],loading=false;

function logoSVG(s=28){
  return `<div class="ml"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>`;
}

function selectRole(id,senha){
  cur={id,senha,label:ROLES[id].label,icon:ROLES[id].icon};
  pin=''; updateDots(false);
  document.getElementById('pinLabel').textContent=cur.icon+' '+cur.label;
  document.getElementById('perr').textContent='';
  document.getElementById('dots').classList.remove('shake');
  document.getElementById('login').classList.remove('active');
  document.getElementById('pin').classList.add('active');
}

function updateDots(err){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).className='dot'+(i<pin.length?(err?' err':' on'):'');
  }
}

function pk(d){
  if(pin.length>=4)return;
  pin+=d; updateDots(false);
  if(pin.length===4)setTimeout(()=>confirmPin(),150);
}
function pd(){pin=pin.slice(0,-1);updateDots(false);document.getElementById('perr').textContent='';}

function confirmPin(){
  if(pin===cur.senha){
    msgs=[{r:'a',t:'Ola! Sou o **Sensei**, assistente interno do Kenkyo. Estou aqui para ajudar com duvidas sobre regras, processos e procedimentos internos. Como posso te ajudar hoje?'}];
    document.getElementById('chatRole').textContent=cur.icon+' '+cur.label;
    renderMsgs();
    document.getElementById('pin').classList.remove('active');
    document.getElementById('chat').classList.add('active');
  } else {
    document.getElementById('perr').textContent='Senha incorreta. Tente novamente.';
    updateDots(true);
    const dots=document.getElementById('dots');
    dots.classList.add('shake');
    setTimeout(()=>{dots.classList.remove('shake');pin='';updateDots(false);},500);
  }
}

function goBack(){
  document.getElementById('login').classList.add('active');
  document.getElementById('pin').classList.remove('active');
  document.getElementById('chat').classList.remove('active');
  cur=null; pin=''; msgs=[];
}

function md(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br/>');
}

function renderMsgs(){
  const el=document.getElementById('msgs');
  el.innerHTML=msgs.map(m=>{
    if(m.r==='a') return `<div class="msg">${logoSVG()}<div class="bub b">${md(m.t)}</div></div>`;
    return `<div class="msg u"><div class="bub u2">${md(m.t)}</div></div>`;
  }).join('');
  if(loading) el.innerHTML+=`<div class="msg">${logoSVG()}<div class="typing"><div class="d" style="animation:pulse 1.2s 0s infinite"></div><div class="d" style="animation:pulse 1.2s .2s infinite"></div><div class="d" style="animation:pulse 1.2s .4s infinite"></div></div></div>`;
  el.scrollTop=el.scrollHeight;
}

async function send(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt||loading)return;
  msgs.push({r:'u',t:txt});
  inp.value='';
  loading=true;
  renderMsgs();
  try{
    const apiMsgs=msgs.map(m=>({role:m.r==='u'?'user':'assistant',content:m.t}));
    const res=await fetch('/api/sensei',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:apiMsgs,role:cur.id})
    });
    const data=await res.json();
    msgs.push({r:'a',t:data.reply||'Erro ao processar resposta.'});
  } catch(e){
    msgs.push({r:'a',t:'Erro de conexao. Tente novamente.'});
  }
  loading=false;
  renderMsgs();
}

document.getElementById('inp').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
</script>
</body>
</html>
